<div class="container">
    <div class="cover-wrapper">
        <img src="./assets/images/notifications.png" class="cover-image" alt="Notifications cover" />
        <div class="overlay-content">
            <div class="header-inner-content">
                <div class="title-section">
                    <h1 class="musicians" style="font-size: 60px;">Notifications</h1>
                    <p style="font-size: 25px; color: #ffffff;">Stay updated with your musical journey</p>
                </div>
                <button class="button" (click)="markAllAsRead()" [disabled]="stats().unread === 0">
                    <mat-icon>done_all</mat-icon>Mark all as read
                </button>
            </div>
        </div>
    </div>

    <div class="stats-card-container">
        <div class="stats-card" dir="ltr">

            <app-stats-counter [number]="stats().unread" label="Unread" glowClass="purple-glow">
            </app-stats-counter>

            <app-stats-counter [number]=" stats().thisWeek" label="New This Week" glowClass="blue-glow">
            </app-stats-counter>

            <app-stats-counter [number]="stats().interactions" label="Interactions" glowClass="green-glow">
            </app-stats-counter>
        </div>
    </div>


    <nav class="filter-nav">
        <div class="category-chips">
            @for (cat of categories; track cat.key) {
            <button (click)="setCategory(cat.key)" [class.active]="activeCategory() === cat.key" class="chip">
                <mat-icon>{{ cat.icon }}</mat-icon> {{ cat.label }}
            </button>
            }
        </div>
        <button class="toggle-btn" (click)="toggleUnread()" [class.active]="unreadOnly()">
            <mat-icon>{{ unreadOnly() ? 'visibility_off' : 'visibility' }}</mat-icon>
            {{ unreadOnly() ? 'Show All' : 'Only Unread' }}
        </button>
    </nav><br>

    <main class="notifications-list">
        @for (note of filteredNotifications(); track note._id) {
        <app-notification-item [note]="note" 
            (toggleStatus)="handleToggleRead(note, $event)" 
            (delete)="deleteNotification(note._id)">
        </app-notification-item>
        } @empty {
        <app-no-results></app-no-results>
        }

        @if (hasMore && filteredNotifications().length > 0) {
        <button class="load-more" (click)="loadMore()">Load Previous Notifications</button>
        }
    </main>
</div>
<br>
